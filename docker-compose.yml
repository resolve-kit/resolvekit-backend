name: resolvekit

services:
  redis:
    image: redis:7-alpine
    container_name: resolvekit_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:16379:6379"
    networks:
      - resolvekit

  db:
    image: postgres:17-alpine
    container_name: resolvekit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agent}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - resolvekit

  kb-db:
    image: postgres:17-alpine
    container_name: resolvekit_kb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${KBS_POSTGRES_DB:-knowledge_bases}
    volumes:
      - ./data/kb-postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - resolvekit

  kb-service:
    build:
      context: .
      dockerfile: knowledge_bases/Dockerfile
    container_name: resolvekit_kb_service
    restart: unless-stopped
    depends_on:
      kb-db:
        condition: service_healthy
    env_file: .env
    environment:
      KBS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-postgres}@kb-db:5432/${KBS_POSTGRES_DB:-knowledge_bases}
      KBS_SERVICE_JWT_SIGNING_KEY: ${KBS_SERVICE_JWT_SIGNING_KEY:-change-me-kb-service-signing-key}
      KBS_SERVICE_JWT_AUDIENCE: ${KBS_SERVICE_JWT_AUDIENCE:-kb-service}
      KBS_ENCRYPTION_KEY: ${KBS_ENCRYPTION_KEY:-change-me-generate-with-python-fernet}
    command: [".venv/bin/uvicorn", "knowledge_bases.main:app", "--host", "0.0.0.0", "--port", "8100", "--reload"]
    volumes:
      - ./knowledge_bases:/app/knowledge_bases
    ports:
      - "127.0.0.1:8100:8100"
    networks:
      - resolvekit

  backend:
    build: .
    container_name: resolvekit_backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      kb-service:
        condition: service_started
    env_file: .env
    environment:
      RK_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent}
      RK_KNOWLEDGE_BASES_BASE_URL: http://kb-service:8100
      RK_KNOWLEDGE_BASES_SIGNING_KEY: ${KBS_SERVICE_JWT_SIGNING_KEY:-change-me-kb-service-signing-key}
      RK_KNOWLEDGE_BASES_AUDIENCE: ${KBS_SERVICE_JWT_AUDIENCE:-kb-service}
      RK_REDIS_URL: ${RK_REDIS_URL:-redis://redis:6379/0}
    command: ["uv", "run", "uvicorn", "agent.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./agent:/app/agent
      - ./alembic:/app/alembic
      - ./main.py:/app/main.py
      - ./alembic.ini:/app/alembic.ini
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - resolvekit

  dashboard:
    image: node:22-alpine
    container_name: resolvekit_dashboard
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - api
    env_file: .env
    command: >
      sh -lc "set -e;
      rm -rf .next-dashboard;
      npm install --legacy-peer-deps --no-audit --no-fund --package-lock=false;
      npx prisma generate;
      node -e \"const net=require('net'); const close=(a,b)=>()=>{a.destroy(); b.destroy();}; net.createServer((client)=>{ const upstream=net.connect(8000,'backend'); client.pipe(upstream); upstream.pipe(client); client.on('error', close(client, upstream)); upstream.on('error', close(upstream, client)); }).listen(8000,'127.0.0.1');\" &
      npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      NEXT_PUBLIC_IOS_SDK_REPO_URL: ${NEXT_PUBLIC_IOS_SDK_REPO_URL:-}
      RESOLVEKIT_SERVER_AGENT_BASE_URL: ${RESOLVEKIT_SERVER_AGENT_BASE_URL:-http://localhost:8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent}
      RK_JWT_SECRET: ${RK_JWT_SECRET:-change-me-generate-with-openssl-rand-hex-32}
      RK_JWT_ALGORITHM: ${RK_JWT_ALGORITHM:-HS256}
      RK_JWT_EXPIRE_MINUTES: ${RK_JWT_EXPIRE_MINUTES:-1440}
      RK_ENCRYPTION_KEY: ${RK_ENCRYPTION_KEY:-change-me-generate-with-python-fernet}
      RK_KNOWLEDGE_BASES_BASE_URL: http://kb-service:8100
      RK_KNOWLEDGE_BASES_AUDIENCE: ${KBS_SERVICE_JWT_AUDIENCE:-kb-service}
      RK_KNOWLEDGE_BASES_SIGNING_KEY: ${KBS_SERVICE_JWT_SIGNING_KEY:-change-me-kb-service-signing-key}
      RK_KNOWLEDGE_BASES_JWT_ALGORITHM: ${RK_KNOWLEDGE_BASES_JWT_ALGORITHM:-HS256}
      NEXT_DIST_DIR: .next-dashboard
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - resolvekit

  api:
    image: node:22-alpine
    container_name: resolvekit_api
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    env_file: .env
    command: >
      sh -lc "set -e;
      rm -rf .next-api;
      npm install --legacy-peer-deps --no-audit --no-fund --package-lock=false;
      npx prisma generate;
      node -e \"const net=require('net'); const close=(a,b)=>()=>{a.destroy(); b.destroy();}; net.createServer((client)=>{ const upstream=net.connect(8000,'backend'); client.pipe(upstream); upstream.pipe(client); client.on('error', close(client, upstream)); upstream.on('error', close(upstream, client)); }).listen(8000,'127.0.0.1');\" &
      npm run dev -- --hostname 0.0.0.0 --port 3002"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      NEXT_PUBLIC_IOS_SDK_REPO_URL: ${NEXT_PUBLIC_IOS_SDK_REPO_URL:-}
      RESOLVEKIT_SERVER_AGENT_BASE_URL: ${RESOLVEKIT_SERVER_AGENT_BASE_URL:-http://localhost:8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent}
      RK_JWT_SECRET: ${RK_JWT_SECRET:-change-me-generate-with-openssl-rand-hex-32}
      RK_JWT_ALGORITHM: ${RK_JWT_ALGORITHM:-HS256}
      RK_JWT_EXPIRE_MINUTES: ${RK_JWT_EXPIRE_MINUTES:-1440}
      RK_ENCRYPTION_KEY: ${RK_ENCRYPTION_KEY:-change-me-generate-with-python-fernet}
      RK_KNOWLEDGE_BASES_BASE_URL: http://kb-service:8100
      RK_KNOWLEDGE_BASES_AUDIENCE: ${KBS_SERVICE_JWT_AUDIENCE:-kb-service}
      RK_KNOWLEDGE_BASES_SIGNING_KEY: ${KBS_SERVICE_JWT_SIGNING_KEY:-change-me-kb-service-signing-key}
      RK_KNOWLEDGE_BASES_JWT_ALGORITHM: ${RK_KNOWLEDGE_BASES_JWT_ALGORITHM:-HS256}
      RK_CORS_ALLOWED_ORIGINS: ${RK_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3002}
      NEXT_DIST_DIR: .next-api
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./dashboard:/app
      - api_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3002:3002"
    networks:
      - resolvekit

  caddy:
    image: caddy:2.8.4
    container_name: resolvekit_caddy
    restart: unless-stopped
    profiles: ["gateway"]
    depends_on:
      - backend
      - kb-service
      - dashboard
      - api
    env_file: .env
    ports:
      - "${CADDY_HTTP_BIND:-0.0.0.0:80}:80"
      - "${CADDY_HTTPS_BIND:-0.0.0.0:443}:443"
      - "${CADDY_HTTPS_BIND:-0.0.0.0:443}:443/udp"
      - "${CADDY_LOCAL_BIND:-127.0.0.1:8080}:8080"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/data:/data
      - ./infra/caddy/config:/config
    networks:
      - resolvekit

networks:
  resolvekit:
    name: resolvekit_default
    driver: bridge

volumes:
  dashboard_node_modules:
  api_node_modules:
