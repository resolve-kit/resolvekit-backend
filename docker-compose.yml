name: resolvekit

services:
  redis:
    image: redis:7-alpine
    container_name: resolvekit_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:16379:6379"
    networks:
      - resolvekit

  db:
    image: postgres:17-alpine
    container_name: resolvekit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agent}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - resolvekit

  kb-db:
    image: postgres:17-alpine
    container_name: resolvekit_kb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${KBS_POSTGRES_DB:-knowledge_bases}
    volumes:
      - ./data/kb-postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - resolvekit

  kb-service:
    build:
      context: .
      dockerfile: knowledge_bases/Dockerfile
    container_name: resolvekit_kb_service
    restart: unless-stopped
    depends_on:
      kb-db:
        condition: service_healthy
    env_file: .env
    environment:
      KBS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-postgres}@kb-db:5432/${KBS_POSTGRES_DB:-knowledge_bases}
      KBS_SERVICE_JWT_SIGNING_KEY: ${KBS_SERVICE_JWT_SIGNING_KEY:-change-me-kb-service-signing-key}
      KBS_SERVICE_JWT_AUDIENCE: ${KBS_SERVICE_JWT_AUDIENCE:-kb-service}
      KBS_ENCRYPTION_KEY: ${KBS_ENCRYPTION_KEY:-change-me-generate-with-python-fernet}
    command: [".venv/bin/uvicorn", "knowledge_bases.main:app", "--host", "0.0.0.0", "--port", "8100", "--reload"]
    volumes:
      - ./knowledge_bases:/app/knowledge_bases
    ports:
      - "127.0.0.1:8100:8100"
    networks:
      - resolvekit

  backend:
    build: .
    container_name: resolvekit_backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      kb-service:
        condition: service_started
    env_file: .env
    environment:
      IAA_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent}
      IAA_KNOWLEDGE_BASES_BASE_URL: http://kb-service:8100
      IAA_KNOWLEDGE_BASES_SIGNING_KEY: ${KBS_SERVICE_JWT_SIGNING_KEY:-change-me-kb-service-signing-key}
      IAA_KNOWLEDGE_BASES_AUDIENCE: ${KBS_SERVICE_JWT_AUDIENCE:-kb-service}
      IAA_REDIS_URL: ${IAA_REDIS_URL:-redis://redis:6379/0}
    command: ["uv", "run", "uvicorn", "agent.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./agent:/app/agent
      - ./alembic:/app/alembic
      - ./main.py:/app/main.py
      - ./alembic.ini:/app/alembic.ini
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - resolvekit

  dashboard:
    image: node:22-alpine
    container_name: resolvekit_dashboard
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - api
    command: >
      sh -c "rm -rf .next-dashboard &&
      if [ ! -f /resolvekit-nextjs-sdk/package.json ] || [ ! -d /resolvekit-nextjs-sdk/src ]; then
      echo 'ERROR: Local resolvekit-nextjs-sdk package.json/src not found at /resolvekit-nextjs-sdk.' &&
      echo 'Set RESOLVEKIT_NEXTJS_SDK_PATH to your SDK checkout before docker compose up.' &&
      exit 1;
      fi &&
      rm -rf /tmp/resolvekit-nextjs-sdk &&
      mkdir -p /tmp/resolvekit-nextjs-sdk &&
      cp /resolvekit-nextjs-sdk/package.json /tmp/resolvekit-nextjs-sdk/package.json &&
      if [ -f /resolvekit-nextjs-sdk/package-lock.json ]; then cp /resolvekit-nextjs-sdk/package-lock.json /tmp/resolvekit-nextjs-sdk/package-lock.json; fi &&
      cp -R /resolvekit-nextjs-sdk/src /tmp/resolvekit-nextjs-sdk/src &&
      cp /resolvekit-nextjs-sdk/tsconfig.json /tmp/resolvekit-nextjs-sdk/tsconfig.json &&
      npm --prefix /tmp/resolvekit-nextjs-sdk install --legacy-peer-deps --no-audit --no-fund --package-lock=false &&
      npm --prefix /tmp/resolvekit-nextjs-sdk run build &&
      npm install --legacy-peer-deps --no-audit --no-fund --package-lock=false || true &&
      rm -rf /app/node_modules/@resolvekit/nextjs/dist &&
      cp -r /tmp/resolvekit-nextjs-sdk/dist /app/node_modules/@resolvekit/nextjs/dist &&
      npx prisma generate &&
      node -e \"require.resolve('@resolvekit/nextjs'); require.resolve('@resolvekit/nextjs/client'); require.resolve('@resolvekit/nextjs/react'); require.resolve('@resolvekit/nextjs/server');\" &&
      node -e \"const net=require('net'); const close=(a,b)=>()=>{a.destroy(); b.destroy();}; net.createServer((client)=>{ const upstream=net.connect(8000,'backend'); client.pipe(upstream); upstream.pipe(client); client.on('error', close(client, upstream)); upstream.on('error', close(upstream, client)); }).listen(8000,'127.0.0.1');\" &
      npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3002}
      NEXT_PUBLIC_RESOLVEKIT_ENABLED: ${NEXT_PUBLIC_RESOLVEKIT_ENABLED:-false}
      RESOLVEKIT_KEY: ${RESOLVEKIT_KEY:-}
      RESOLVEKIT_SERVER_AGENT_BASE_URL: ${RESOLVEKIT_SERVER_AGENT_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_RESOLVEKIT_AGENT_BASE_URL: ${NEXT_PUBLIC_RESOLVEKIT_AGENT_BASE_URL:-http://localhost:8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent}
      IAA_JWT_SECRET: ${IAA_JWT_SECRET:-change-me-generate-with-openssl-rand-hex-32}
      IAA_JWT_ALGORITHM: ${IAA_JWT_ALGORITHM:-HS256}
      IAA_JWT_EXPIRE_MINUTES: ${IAA_JWT_EXPIRE_MINUTES:-1440}
      IAA_ENCRYPTION_KEY: ${IAA_ENCRYPTION_KEY:-change-me-generate-with-python-fernet}
      IAA_KNOWLEDGE_BASES_BASE_URL: http://kb-service:8100
      IAA_KNOWLEDGE_BASES_AUDIENCE: ${KBS_SERVICE_JWT_AUDIENCE:-kb-service}
      IAA_KNOWLEDGE_BASES_SIGNING_KEY: ${KBS_SERVICE_JWT_SIGNING_KEY:-change-me-kb-service-signing-key}
      IAA_KNOWLEDGE_BASES_JWT_ALGORITHM: ${IAA_KNOWLEDGE_BASES_JWT_ALGORITHM:-HS256}
      NEXT_DIST_DIR: .next-dashboard
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./dashboard:/app
      - ${RESOLVEKIT_NEXTJS_SDK_PATH:?Set RESOLVEKIT_NEXTJS_SDK_PATH}:/resolvekit-nextjs-sdk:ro
      - dashboard_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - resolvekit

  api:
    image: node:22-alpine
    container_name: resolvekit_api
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    command: >
      sh -c "rm -rf .next-api &&
      if [ ! -f /resolvekit-nextjs-sdk/package.json ] || [ ! -d /resolvekit-nextjs-sdk/src ]; then
      echo 'ERROR: Local resolvekit-nextjs-sdk package.json/src not found at /resolvekit-nextjs-sdk.' &&
      echo 'Set RESOLVEKIT_NEXTJS_SDK_PATH to your SDK checkout before docker compose up.' &&
      exit 1;
      fi &&
      rm -rf /tmp/resolvekit-nextjs-sdk &&
      mkdir -p /tmp/resolvekit-nextjs-sdk &&
      cp /resolvekit-nextjs-sdk/package.json /tmp/resolvekit-nextjs-sdk/package.json &&
      if [ -f /resolvekit-nextjs-sdk/package-lock.json ]; then cp /resolvekit-nextjs-sdk/package-lock.json /tmp/resolvekit-nextjs-sdk/package-lock.json; fi &&
      cp -R /resolvekit-nextjs-sdk/src /tmp/resolvekit-nextjs-sdk/src &&
      cp /resolvekit-nextjs-sdk/tsconfig.json /tmp/resolvekit-nextjs-sdk/tsconfig.json &&
      npm --prefix /tmp/resolvekit-nextjs-sdk install --legacy-peer-deps --no-audit --no-fund --package-lock=false &&
      npm --prefix /tmp/resolvekit-nextjs-sdk run build &&
      npm install --legacy-peer-deps --no-audit --no-fund --package-lock=false || true &&
      rm -rf /app/node_modules/@resolvekit/nextjs/dist &&
      cp -r /tmp/resolvekit-nextjs-sdk/dist /app/node_modules/@resolvekit/nextjs/dist &&
      npx prisma generate &&
      node -e \"require.resolve('@resolvekit/nextjs'); require.resolve('@resolvekit/nextjs/client'); require.resolve('@resolvekit/nextjs/react'); require.resolve('@resolvekit/nextjs/server');\" &&
      node -e \"const net=require('net'); const close=(a,b)=>()=>{a.destroy(); b.destroy();}; net.createServer((client)=>{ const upstream=net.connect(8000,'backend'); client.pipe(upstream); upstream.pipe(client); client.on('error', close(client, upstream)); upstream.on('error', close(upstream, client)); }).listen(8000,'127.0.0.1');\" &
      npm run dev -- --hostname 0.0.0.0 --port 3002"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3002}
      NEXT_PUBLIC_RESOLVEKIT_ENABLED: ${NEXT_PUBLIC_RESOLVEKIT_ENABLED:-false}
      RESOLVEKIT_KEY: ${RESOLVEKIT_KEY:-}
      RESOLVEKIT_SERVER_AGENT_BASE_URL: ${RESOLVEKIT_SERVER_AGENT_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_RESOLVEKIT_AGENT_BASE_URL: ${NEXT_PUBLIC_RESOLVEKIT_AGENT_BASE_URL:-http://localhost:8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent}
      IAA_JWT_SECRET: ${IAA_JWT_SECRET:-change-me-generate-with-openssl-rand-hex-32}
      IAA_JWT_ALGORITHM: ${IAA_JWT_ALGORITHM:-HS256}
      IAA_JWT_EXPIRE_MINUTES: ${IAA_JWT_EXPIRE_MINUTES:-1440}
      IAA_ENCRYPTION_KEY: ${IAA_ENCRYPTION_KEY:-change-me-generate-with-python-fernet}
      IAA_KNOWLEDGE_BASES_BASE_URL: http://kb-service:8100
      IAA_KNOWLEDGE_BASES_AUDIENCE: ${KBS_SERVICE_JWT_AUDIENCE:-kb-service}
      IAA_KNOWLEDGE_BASES_SIGNING_KEY: ${KBS_SERVICE_JWT_SIGNING_KEY:-change-me-kb-service-signing-key}
      IAA_KNOWLEDGE_BASES_JWT_ALGORITHM: ${IAA_KNOWLEDGE_BASES_JWT_ALGORITHM:-HS256}
      IAA_CORS_ALLOWED_ORIGINS: ${IAA_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3002}
      NEXT_DIST_DIR: .next-api
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./dashboard:/app
      - ${RESOLVEKIT_NEXTJS_SDK_PATH:?Set RESOLVEKIT_NEXTJS_SDK_PATH}:/resolvekit-nextjs-sdk:ro
      - api_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3002:3002"
    networks:
      - resolvekit

  website:
    image: node:22-alpine
    container_name: resolvekit_website
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --hostname 0.0.0.0 --port 3001"
    environment:
      NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL:-http://localhost:3000}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./website:/app
      - website_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - resolvekit

networks:
  resolvekit:
    name: resolvekit_default
    driver: bridge

volumes:
  dashboard_node_modules:
  api_node_modules:
  website_node_modules:
