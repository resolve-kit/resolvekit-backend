name: resolvekit

services:
  db:
    image: postgres:17-alpine
    container_name: resolvekit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agent}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - resolvekit

  kb-db:
    image: postgres:17-alpine
    container_name: resolvekit_kb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${KBS_POSTGRES_DB:-knowledge_bases}
    volumes:
      - ./data/kb-postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - resolvekit

  kb-service:
    build:
      context: .
      dockerfile: knowledge_bases/Dockerfile
    container_name: resolvekit_kb_service
    restart: unless-stopped
    depends_on:
      kb-db:
        condition: service_healthy
    env_file: .env
    environment:
      KBS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-postgres}@kb-db:5432/${KBS_POSTGRES_DB:-knowledge_bases}
      KBS_SERVICE_JWT_SIGNING_KEY: ${KBS_SERVICE_JWT_SIGNING_KEY:-change-me-kb-service-signing-key}
      KBS_SERVICE_JWT_AUDIENCE: ${KBS_SERVICE_JWT_AUDIENCE:-kb-service}
      KBS_ENCRYPTION_KEY: ${KBS_ENCRYPTION_KEY:-change-me-generate-with-python-fernet}
    networks:
      - resolvekit

  backend:
    build: .
    container_name: resolvekit_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kb-service:
        condition: service_started
    env_file: .env
    environment:
      IAA_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent}
      IAA_KNOWLEDGE_BASES_BASE_URL: http://kb-service:8100
      IAA_KNOWLEDGE_BASES_SIGNING_KEY: ${KBS_SERVICE_JWT_SIGNING_KEY:-change-me-kb-service-signing-key}
      IAA_KNOWLEDGE_BASES_AUDIENCE: ${KBS_SERVICE_JWT_AUDIENCE:-kb-service}
    expose:
      - "8000"
    networks:
      - resolvekit

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3002}
        NEXT_PUBLIC_PLAYBOOK_ENABLED: ${NEXT_PUBLIC_PLAYBOOK_ENABLED:-false}
        NEXT_PUBLIC_PLAYBOOK_KEY: ${NEXT_PUBLIC_PLAYBOOK_KEY:-}
        NEXT_PUBLIC_PLAYBOOK_AGENT_BASE_URL: ${NEXT_PUBLIC_PLAYBOOK_AGENT_BASE_URL:-http://localhost:8000}
    container_name: resolvekit_dashboard
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_PLAYBOOK_ENABLED: ${NEXT_PUBLIC_PLAYBOOK_ENABLED:-false}
      NEXT_PUBLIC_PLAYBOOK_KEY: ${NEXT_PUBLIC_PLAYBOOK_KEY:-}
      NEXT_PUBLIC_PLAYBOOK_AGENT_BASE_URL: ${NEXT_PUBLIC_PLAYBOOK_AGENT_BASE_URL:-http://localhost:8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent}
      IAA_JWT_SECRET: ${IAA_JWT_SECRET:-change-me-generate-with-openssl-rand-hex-32}
      IAA_JWT_ALGORITHM: ${IAA_JWT_ALGORITHM:-HS256}
      IAA_JWT_EXPIRE_MINUTES: ${IAA_JWT_EXPIRE_MINUTES:-1440}
      IAA_ENCRYPTION_KEY: ${IAA_ENCRYPTION_KEY:-change-me-generate-with-python-fernet}
      IAA_KNOWLEDGE_BASES_BASE_URL: http://kb-service:8100
      IAA_KNOWLEDGE_BASES_AUDIENCE: ${KBS_SERVICE_JWT_AUDIENCE:-kb-service}
      IAA_KNOWLEDGE_BASES_SIGNING_KEY: ${KBS_SERVICE_JWT_SIGNING_KEY:-change-me-kb-service-signing-key}
      IAA_KNOWLEDGE_BASES_JWT_ALGORITHM: ${IAA_KNOWLEDGE_BASES_JWT_ALGORITHM:-HS256}
    expose:
      - "3000"
    networks:
      - resolvekit

  api:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3002}
        NEXT_PUBLIC_PLAYBOOK_ENABLED: ${NEXT_PUBLIC_PLAYBOOK_ENABLED:-false}
        NEXT_PUBLIC_PLAYBOOK_KEY: ${NEXT_PUBLIC_PLAYBOOK_KEY:-}
        NEXT_PUBLIC_PLAYBOOK_AGENT_BASE_URL: ${NEXT_PUBLIC_PLAYBOOK_AGENT_BASE_URL:-http://localhost:8000}
    container_name: resolvekit_api
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_PLAYBOOK_ENABLED: ${NEXT_PUBLIC_PLAYBOOK_ENABLED:-false}
      NEXT_PUBLIC_PLAYBOOK_KEY: ${NEXT_PUBLIC_PLAYBOOK_KEY:-}
      NEXT_PUBLIC_PLAYBOOK_AGENT_BASE_URL: ${NEXT_PUBLIC_PLAYBOOK_AGENT_BASE_URL:-http://localhost:8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent}
      IAA_JWT_SECRET: ${IAA_JWT_SECRET:-change-me-generate-with-openssl-rand-hex-32}
      IAA_JWT_ALGORITHM: ${IAA_JWT_ALGORITHM:-HS256}
      IAA_JWT_EXPIRE_MINUTES: ${IAA_JWT_EXPIRE_MINUTES:-1440}
      IAA_ENCRYPTION_KEY: ${IAA_ENCRYPTION_KEY:-change-me-generate-with-python-fernet}
      IAA_KNOWLEDGE_BASES_BASE_URL: http://kb-service:8100
      IAA_KNOWLEDGE_BASES_AUDIENCE: ${KBS_SERVICE_JWT_AUDIENCE:-kb-service}
      IAA_KNOWLEDGE_BASES_SIGNING_KEY: ${KBS_SERVICE_JWT_SIGNING_KEY:-change-me-kb-service-signing-key}
      IAA_KNOWLEDGE_BASES_JWT_ALGORITHM: ${IAA_KNOWLEDGE_BASES_JWT_ALGORITHM:-HS256}
      IAA_CORS_ALLOWED_ORIGINS: ${IAA_CORS_ALLOWED_ORIGINS:-https://console.resolvekit.app}
    expose:
      - "3000"
    networks:
      - resolvekit

  website:
    build:
      context: ./website
      args:
        NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL:-http://localhost:3000}
    container_name: resolvekit_website
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - resolvekit

networks:
  resolvekit:
    name: resolvekit_default
    driver: bridge
